name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: '0 4 * * 1'

# One run per branch at a time.
# github.head_ref is set for pull_request events (the feature branch name).
# github.ref_name is set for push events (also the branch name).
# Both resolve to the same value for a given branch, so push-triggered runs
# are cancelled when the pull_request event fires for the same commit.
concurrency:
  group: codeql-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript/extended'
