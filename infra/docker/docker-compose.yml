version: '3.8'

services:
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://myathan:myathan@db:5432/myathan
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET:-myathan}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=myathan
      - POSTGRES_PASSWORD=myathan
      - POSTGRES_DB=myathan
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
